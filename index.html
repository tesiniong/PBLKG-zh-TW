<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>實用立陶宛標準語語法</title>

  <!-- Web fonts: Noto Sans (Latin, incl. Lithuanian) + Noto Sans TC (Han). Same look on every platform. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Sans+TC:wght@400;500;700&display=swap">

  <!-- IPA font: Charis SIL, pinned 5.2.7. Load both subsets; IPA glyphs live in latin-ext. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/charis-sil@5.2.7/latin-400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/charis-sil@5.2.7/latin-ext-400.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3.2.0/dist/style.min.css">

  <style>
    .markdown-section {
      max-width: 820px;
      font-family: 'Noto Sans', 'Noto Sans TC', sans-serif;
      font-size: 17px;
      line-height: 1.85;
      letter-spacing: 0.01em;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    .markdown-section p { margin: 0.9em 0; }
    .markdown-section li { margin: 0.35em 0; line-height: 1.8; }

    .markdown-section h1,
    .markdown-section h2 {
      border-bottom: 1px solid var(--fn-border, rgba(128,128,128,.25));
      padding-bottom: .3em;
      margin-top: 1.8em;
      line-height: 1.4;
    }
    .markdown-section h1 { font-size: 1.9em; }
    .markdown-section h2 { font-size: 1.5em; }
    .markdown-section h3 { font-size: 1.22em; margin-top: 1.4em; }
    .markdown-section h4 { font-size: 1.06em; margin-top: 1.1em; }

    /* Phonetic notation; styled by ipaPlugin */
    .ipa {
      font-family: 'Charis SIL', 'Noto Sans', 'Noto Sans TC', serif;
      font-feature-settings: "kern" 1;
      white-space: nowrap;
    }

    .markdown-section table { border-collapse: collapse; margin: 1em 0; }
    .markdown-section th, .markdown-section td { padding: .5em .8em; }
    .markdown-section thead th { font-weight: 700; }
    .markdown-section tr:nth-child(2n) td { background: rgba(128,128,128,.06); }
    .table-scroll { overflow-x: auto; margin: 1em 0; }
    .table-scroll table { margin: 0; }

    .footnotes { font-size: 0.9em; }
    sup.fn-ref a { cursor: pointer; text-decoration: none; }
    .footnotes a.fn-back { cursor: pointer; text-decoration: none; }

    /* Footnote hover/tap popover */
    #fn-popover {
      position: fixed; z-index: 9999; max-width: 380px;
      padding: .7em .9em; border-radius: 8px;
      font-size: .9rem; line-height: 1.65;
      border: 1px solid rgba(128,128,128,.35);
      box-shadow: 0 6px 22px rgba(0,0,0,.28);
      opacity: 0; visibility: hidden; transition: opacity .12s ease;
      pointer-events: auto;
    }
    #fn-popover.show { opacity: 1; visibility: visible; }
    #fn-popover .fn-back { display: none; }

    #reading-progress {
      position: fixed; top: 0; left: 0; height: 3px; width: 0;
      background: #42b983; z-index: 10000; transition: width .1s linear;
    }
    #back-to-top {
      position: fixed; right: 22px; bottom: 26px; width: 42px; height: 42px;
      border: none; border-radius: 50%; cursor: pointer; z-index: 9000;
      background: #42b983; color: #fff; font-size: 20px; line-height: 42px;
      box-shadow: 0 3px 12px rgba(0,0,0,.3);
      opacity: 0; visibility: hidden; transition: opacity .2s ease;
    }
    #back-to-top.show { opacity: .9; visibility: visible; }
    #back-to-top:hover { opacity: 1; }

    @media (max-width: 600px) {
      .markdown-section { font-size: 16px; }
    }

    /* ---- 圖：金黃樹狀／流程圖（org-chart 巢狀清單，自適應寬度） ----
       用法：<div class="fig-tree"><ul><li>
               <div class="fig-node is-head">頂框</div>
               <ul><li><div class="fig-node">子框</div> …巢狀… </li></ul>
             </li></ul></div>
       連接線用 li 的 ::before/::after 邊框繪製；框內可放粗體/斜體/換行。 */
    .fig-tree, .fig-flow, .fig-col, .fig-cols {
      --fig-line: #c8922e; --fig-head: #e0a73e; --fig-box: #f0d090; --fig-ink: #3a2a10;
    }
    .fig-tree {
      overflow-x: auto; text-align: center;
      margin: 1.4em 0; padding-bottom: 6px;
    }
    .fig-tree ul {
      display: inline-flex; justify-content: center; align-items: flex-start;
      position: relative; margin: 0; padding: 26px 0 0; list-style: none;
    }
    .fig-tree > ul { padding-top: 0; }
    .fig-tree li {
      list-style: none; margin: 0; padding: 26px 9px 0; position: relative;
      display: flex; flex-direction: column; align-items: center;
    }
    /* 橫向母線 + 往子框的下接線 */
    .fig-tree li::before, .fig-tree li::after {
      content: ''; position: absolute; top: 0; right: 50%;
      width: 50%; height: 26px; border-top: 2px solid var(--fig-line);
    }
    .fig-tree li::after { right: auto; left: 50%; border-left: 2px solid var(--fig-line); }
    /* 獨生子：單一直線（由父層 ul 的 ::before 提供），不畫橫線 */
    .fig-tree li:only-child::before, .fig-tree li:only-child::after { display: none; }
    .fig-tree li:only-child { padding-top: 26px; }
    .fig-tree > ul > li:only-child { padding-top: 0; }
    /* 兩端不需外側半條橫線；末子的下接線改由 ::before 的 border-right 提供 */
    .fig-tree li:first-child::before, .fig-tree li:last-child::after { border: 0 none; }
    .fig-tree li:last-child::before { border-right: 2px solid var(--fig-line); border-radius: 0 6px 0 0; }
    .fig-tree li:first-child::after { border-radius: 6px 0 0 0; }
    /* 父框往下到子層母線的直線 */
    .fig-tree ul ul::before {
      content: ''; position: absolute; top: 0; left: 50%;
      width: 0; height: 26px; border-left: 2px solid var(--fig-line);
    }
    /* 框（樹狀與流程圖共用） */
    .fig-node {
      display: inline-block; box-sizing: border-box; max-width: 230px;
      background: var(--fig-box); color: var(--fig-ink);
      border-radius: 5px; padding: 9px 13px; line-height: 1.6;
      text-align: center; font-size: .86em;
    }
    .fig-node.is-head { background: var(--fig-head); font-weight: 700; }
    .fig-node.al { text-align: left; }
    .fig-node i { color: var(--fig-ink); }

    /* ---- 流程圖：詞幹＋後綴＝形式（橫向公式，以 ＋／➔ 運算子連接） ---- */
    .fig-flow {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 10px 14px; margin: 1.4em 0; overflow-x: auto;
    }
    .fig-flow .fig-stack {
      display: inline-flex; flex-direction: column; align-items: center; gap: 9px;
    }
    .fig-flow .fig-op {
      font-size: 1.7em; font-weight: 700; color: var(--fig-line); line-height: 1;
    }
    .fig-flow .fig-node { max-width: 340px; }
    .fig-op { font-size: 1.6em; font-weight: 700; color: var(--fig-line); line-height: 1; }

    /* ---- 直向框列（fig5 格系統、fig9 級系統）與雙欄比較（fig7） ---- */
    .fig-col {
      display: flex; flex-direction: column; align-items: center;
      gap: 9px; margin: 1.4em 0;
    }
    .fig-cols {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start;
      gap: 18px; margin: 1.4em 0;
    }
    .fig-cols .fig-col { margin: 0; }
    .fig-cols .fig-col .fig-node { max-width: 300px; }

    /* 框內若含內容清單，需中和上面的樹狀規則，避免被當成節點 */
    .fig-tree .fig-node ul, .fig-tree .fig-node ol {
      display: block; position: static; text-align: left;
      margin: .35em 0 0; padding-left: 1.4em;
    }
    .fig-tree .fig-node li {
      display: list-item; position: static; align-items: initial;
      margin: .15em 0; padding: 0;
    }
    .fig-tree .fig-node li::before, .fig-tree .fig-node li::after,
    .fig-tree .fig-node ul::before, .fig-tree .fig-node ul::after { content: none; border: 0; display: none; }
    @media (max-width: 600px) {
      .fig-node { font-size: .8em; max-width: 180px; padding: 7px 9px; }
    }
  </style>

  <!-- Optional: for 100% IPA coverage, self-host the full font. Download web/Charis-Regular.woff2 from
       software.sil.org/charis, put it in fonts/, remove the two @fontsource links above, and add:
       <style>@font-face{font-family:'Charis SIL';font-weight:400;font-display:swap;
       src:url('fonts/Charis-Regular.woff2') format('woff2');}</style> -->
</head>
<body>
  <div id="app"></div>
  <div id="reading-progress"></div>
  <button id="back-to-top" title="回到頂部" aria-label="回到頂部">↑</button>

  <script>
    // Plugin 1: wrap [ ... ] phonetic notation in <span class="ipa">.
    // Skips footnotes [^x], brackets containing Han, plain numbers, and HTML. Must run before footnotePlugin.
    function ipaPlugin(hook) {
      hook.afterEach(function(html) {
        return html.replace(/\[([^\]\n]+)\]/g, function(whole, inner) {
          if (inner.charAt(0) === '^') return whole;
          if (/[\u3400-\u9fff\uf900-\ufaff]/.test(inner)) return whole;
          if (/^[\s\d.,;:()-]+$/.test(inner)) return whole;
          if (/[<>]/.test(inner)) return whole;
          return '<span class="ipa">[' + inner + ']</span>';
        });
      });
    }

    // Plugin 2: custom footnotes. data-fn + scrollIntoView avoids the hash-router 404.
    // Hover (desktop) or tap (touch) shows the note in a popover.
    function footnotePlugin(hook) {
      hook.afterEach(function(html) {
        var definitions = {}, order = [];
        html = html.replace(/<p>\[\^([^\]]+)\]:\s*([\s\S]*?)<\/p>/g, function(_, name, text) {
          if (!definitions[name]) { order.push(name); definitions[name] = text.trim(); }
          return '';
        });
        var nameToNum = {};
        order.forEach(function(name, i) { nameToNum[name] = i + 1; });
        html = html.replace(/\[\^([^\]]+)\]/g, function(_, name) {
          var num = nameToNum[name] || '?';
          var id = encodeURIComponent(name);
          return '<sup class="fn-ref" id="fnref-' + id + '"><a data-fn="' + id + '">[' + num + ']</a></sup>';
        });
        if (order.length > 0) {
          html += '<hr><section class="footnotes"><ol>';
          order.forEach(function(name) {
            var id = encodeURIComponent(name);
            html += '<li id="fn-' + id + '">' + definitions[name] +
                    ' <a class="fn-back" data-fnback="' + id + '" title="返回內文">&#8617;</a></li>';
          });
          html += '</ol></section>';
        }
        return html;
      });

      hook.doneEach(function() {
        var pop = document.getElementById('fn-popover');
        if (!pop) {
          pop = document.createElement('div');
          pop.id = 'fn-popover';
          document.body.appendChild(pop);
          pop.addEventListener('mouseenter', function(){ clearTimeout(pop._t); });
          pop.addEventListener('mouseleave', hidePop);
        }
        function themePop() {
          var cs = getComputedStyle(document.body);
          pop.style.background = cs.backgroundColor || '#1c2129';
          pop.style.color = cs.color || '#b4b4b4';
        }
        function hidePop(){ pop._t = setTimeout(function(){ pop.classList.remove('show'); }, 120); }
        function showPopFor(ref) {
          var id = ref.getAttribute('data-fn');
          var def = document.getElementById('fn-' + id);
          if (!def) return;
          themePop();
          pop.innerHTML = def.innerHTML;
          pop.classList.add('show');
          var r = ref.getBoundingClientRect();
          pop.style.left = '0px'; pop.style.top = '0px';
          var pw = pop.offsetWidth, ph = pop.offsetHeight;
          var left = Math.min(Math.max(8, r.left + r.width/2 - pw/2), window.innerWidth - pw - 8);
          var top  = r.top - ph - 8;
          if (top < 8) top = r.bottom + 8;       // flip below when no room above
          pop.style.left = left + 'px';
          pop.style.top = top + 'px';
        }

        var canHover = window.matchMedia('(hover: hover)').matches;
        document.querySelectorAll('sup.fn-ref a[data-fn]').forEach(function(a) {
          if (canHover) {
            a.addEventListener('mouseenter', function(){ clearTimeout(pop._t); showPopFor(a); });
            a.addEventListener('mouseleave', hidePop);
          }
          a.onclick = function(e) {
            e.preventDefault();
            if (!canHover) {                       // touch: tap toggles popover
              if (pop.classList.contains('show')) hidePop(); else showPopFor(a);
              return;
            }
            var t = document.getElementById('fn-' + a.getAttribute('data-fn'));
            if (t) t.scrollIntoView({ behavior: 'smooth' });   // desktop: click jumps to the note
          };
        });
        document.addEventListener('click', function(e){   // touch: tap elsewhere closes popover
          if (!canHover && !e.target.closest('sup.fn-ref') && !e.target.closest('#fn-popover'))
            pop.classList.remove('show');
        });

        document.querySelectorAll('a[data-fnback]').forEach(function(a) {
          a.onclick = function(e) {
            e.preventDefault();
            var t = document.getElementById('fnref-' + a.getAttribute('data-fnback'));
            if (t) t.scrollIntoView({ behavior: 'smooth' });
          };
        });
      });
    }

    // Plugin 3: wrap wide tables for horizontal scroll; reading-progress bar; back-to-top button.
    function uiPlugin(hook) {
      hook.doneEach(function() {
        document.querySelectorAll('.markdown-section table').forEach(function(tbl) {
          if (tbl.parentElement && tbl.parentElement.classList.contains('table-scroll')) return;
          var wrap = document.createElement('div');
          wrap.className = 'table-scroll';
          tbl.parentNode.insertBefore(wrap, tbl);
          wrap.appendChild(tbl);
        });
      });
      hook.mounted(function() {
        var bar = document.getElementById('reading-progress');
        var btn = document.getElementById('back-to-top');
        btn.addEventListener('click', function(){ window.scrollTo({ top: 0, behavior: 'smooth' }); });
        function onScroll() {
          var h = document.documentElement.scrollHeight - window.innerHeight;
          var p = h > 0 ? (window.scrollY / h) * 100 : 0;
          bar.style.width = p + '%';
          btn.classList.toggle('show', window.scrollY > 400);
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      });
    }

    // Plugin 0: fix CJK-adjacent emphasis that marked drops.
    // marked's emphasis "flanking" test only counts ASCII characters as
    // punctuation/whitespace. So an italic/bold span whose content starts with
    // ASCII punctuation (a suffix example like *-ija* / *(i)acija* / **-as**)
    // sitting directly after a full-width or CJK character (）、「 etc.) is not
    // recognised as an opener, and the * / ** are printed literally.
    // Rewrite exactly those cases to explicit <em>/<strong> before marked runs.
    // The output is byte-identical to what marked emits for *…* / **…**, so the
    // font/colour styling and the [..]/[^..] afterEach plugins are unaffected.
    function emphasisFixPlugin(hook) {
      hook.beforeEach(function(md) {
        // Bold first, so its ** are consumed before the italic pass.
        md = md.replace(/([^\x00-\x7F])\*\*([-(][^*\n]*?)\*\*(?!\*)/g, '$1<strong>$2</strong>');
        md = md.replace(/([^\x00-\x7F])\*([-(][^*\n]*?)\*(?!\*)/g, '$1<em>$2</em>');
        // Underscore italics are worse next to CJK: marked drops them when the
        // opening _ follows a CJK char AND when the closing _ precedes one. Just
        // turn every underscore-emphasis span into <em> so it bypasses marked's
        // flanking logic entirely. The non-alphanumeric/underscore boundaries
        // keep this off snake_case, URLs and code; ___hr___ has no inner text so
        // it is not matched. Inner **bold** is left for marked to render.
        md = md.replace(/(^|[^A-Za-z0-9_])_([^_\n]+?)_(?![A-Za-z0-9_])/gm, '$1<em>$2</em>');
        return md;
      });
    }

    window.$docsify = {
      name: '實用立陶宛標準語語法',
      loadSidebar: true,
      subMaxLevel: 5,
      plugins: [emphasisFixPlugin, ipaPlugin, footnotePlugin, uiPlugin],   // ipaPlugin must come before footnotePlugin
      search: {                                          // full-text search across the whole book
        placeholder: '搜尋全書…',
        noData: '找不到結果',
        depth: 6,
        hideOtherSidebarContent: false
      },
      darklightTheme: {
        defaultTheme: 'dark',
        dark: {
          accent: '#42b983',
          background: '#1c2129',
          textColor: '#b4b4b4',
          codeBackgroundColor: '#252a34',
          borderColor: '#0d2538',
          sidebarSublink: '#b4b4b4',
          codeTextColor: '#ffffff',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          toogleBackground: '#ffffff'
        },
        light: {
          accent: '#42b983',
          background: '#ffffff',
          textColor: '#34495e',
          codeBackgroundColor: '#f8f8f8',
          borderColor: '#eaecef',
          sidebarSublink: '#505d6b',
          codeTextColor: '#525252',
          blockQuoteColor: '#858585',
          highlightColor: '#0C5C89',
          toogleBackground: '#091a28'
        }
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>   <!-- version must match core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3.2.0/dist/index.min.js"></script>
</body>
</html>

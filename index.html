<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>實用立陶宛標準語語法</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
</head>
<body>
  <div id="app"></div>
  <script>
    function footnotePlugin(hook) {
      hook.afterEach(function(html) {
        var definitions = {};
        var order = [];

        // 第一步：找出並移除腳註定義段落，例如 [^name]: 說明文字
        html = html.replace(/<p>\[\^([^\]]+)\]:\s*([\s\S]*?)<\/p>/g, function(_, name, text) {
          if (!definitions[name]) {
            order.push(name);
            definitions[name] = text.trim();
          }
          return '';
        });

        // 第二步：建立名稱→編號對應
        var nameToNum = {};
        order.forEach(function(name, i) { nameToNum[name] = i + 1; });

        // 第三步：把行內引用 [^name] 換成上標數字連結
        html = html.replace(/\[\^([^\]]+)\]/g, function(_, name) {
          var num = nameToNum[name] || '?';
          return '<sup id="fnref-' + name + '"><a href="#fn-' + name + '">[' + num + ']</a></sup>';
        });

        // 第四步：在文末加入腳註列表
        if (order.length > 0) {
          html += '<hr><section class="footnotes"><ol>';
          order.forEach(function(name) {
            html += '<li id="fn-' + name + '">' + definitions[name] +
                    ' <a href="#fnref-' + name + '" title="返回內文">↩</a></li>';
          });
          html += '</ol></section>';
        }

        return html;
      });
    }

    window.$docsify = {
      name: '實用立陶宛標準語語法',
      loadSidebar: true,
      subMaxLevel: 3,
      plugins: [footnotePlugin],
      darklightTheme: {
        defaultTheme: 'dark',
        dark: {
          accent: '#42b983',
          background: '#1c2129',
          textColor: '#b4b4b4',
          codeBackgroundColor: '#252a34',
          navBackground: '#202531',
          navColor: '#b4b4b4',
          linkColor: '#42b983',
          toogleBackground: '#ffffff'
        },
        light: {
          accent: '#42b983',
          background: '#ffffff',
          textColor: '#34495e',
          codeBackgroundColor: '#f8f8f8',
          navBackground: '#0C5C89',
          navColor: '#ffffff',
          linkColor: '#42b983',
          toogleBackground: '#091a28'
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
